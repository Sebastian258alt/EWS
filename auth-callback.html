<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in…</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:system-ui,sans-serif; background:#0a0e1a; color:#8b9cb3; }
  </style>
</head>
<body>
  <p>Completing sign-in…</p>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    (async function finishOAuthPopup() {
      const origin = window.location.origin;
      const notify = (payload) => {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage(payload, origin);
          window.close();
          return;
        }
        window.location.replace('index.html');
      };

      if (!window.isSupabaseConfigured()) {
        notify({ type: 'EWS_SUPABASE_AUTH', ok: false, error: 'not_configured' });
        return;
      }

      const client = window.createSupabaseClient();
      const { data: { session }, error } = await client.auth.getSession();
      notify({
        type: 'EWS_SUPABASE_AUTH',
        ok: !!session && !error,
        error: error ? error.message : null,
      });
    })();
  </script>
</body>
</html>
